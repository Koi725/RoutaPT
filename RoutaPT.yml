services:
  db:
    image: postgis/postgis:16-3.4
    container_name: routapt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: routapt
      POSTGRES_USER: routapt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routapt -d routapt"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - routapt-net

volumes:
  pgdata:
    driver: local

networks:
  routapt-net:
    driver: bridge
